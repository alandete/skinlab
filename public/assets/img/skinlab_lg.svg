<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Fondo opcional (puedes eliminarlo) -->
  <rect width="100%" height="100%" fill="#0B1120"/>

  <!-- Grupo icono -->
  <g transform="translate(100,200)">

    <!-- Engranaje -->
    <circle r="70" fill="#F97316"/>
    <g fill="#F97316">
      <rect x="-10" y="-110" width="20" height="40"/>
      <rect x="-10" y="70" width="20" height="40"/>
      <rect x="-110" y="-10" width="40" height="20"/>
      <rect x="70" y="-10" width="40" height="20"/>
    </g>

    <!-- Centro -->
    <circle r="35" fill="#0B1120"/>

    <!-- Código -->
    <text x="-20" y="10" font-size="28" fill="#E5E7EB" font-family="monospace">&lt;/&gt;</text>

    <!-- Pincel -->
    <g transform="rotate(-30)">
      <rect x="-5" y="-60" width="10" height="90" fill="#1F2937"/>
      <ellipse cx="0" cy="40" rx="18" ry="28" fill="#F97316"/>
    </g>

  </g>

  <!-- Texto -->
  <text x="260" y="230" font-size="120" font-family="Poppins, Arial, sans-serif">
    <tspan fill="#F97316">Skin</tspan>
    <tspan fill="#E5E7EB">Lab</tspan>
  </text>

</svg>