<div class="palette-page">
  <h2>Paleta de colores</h2>
  <p>Vista previa de la paleta derivada automáticamente de los colores de marca.</p>

  <h3>Primario</h3>
  <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;">
    <div style="width:80px;height:50px;background:var(--ct-primary-light);border-radius:6px;" title="primary-light"></div>
    <div style="width:80px;height:50px;background:var(--ct-primary);border-radius:6px;" title="primary"></div>
    <div style="width:80px;height:50px;background:var(--ct-primary-dark);border-radius:6px;" title="primary-dark"></div>
  </div>

  <h3>Secundario</h3>
  <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;">
    <div style="width:80px;height:50px;background:var(--ct-secondary-light);border-radius:6px;" title="secondary-light"></div>
    <div style="width:80px;height:50px;background:var(--ct-secondary);border-radius:6px;" title="secondary"></div>
    <div style="width:80px;height:50px;background:var(--ct-secondary-dark);border-radius:6px;" title="secondary-dark"></div>
  </div>

  <h3>Neutros</h3>
  <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;">
    <div style="width:50px;height:50px;background:var(--ct-neutral-050);border-radius:6px;border:1px solid #ddd;" title="050"></div>
    <div style="width:50px;height:50px;background:var(--ct-neutral-100);border-radius:6px;" title="100"></div>
    <div style="width:50px;height:50px;background:var(--ct-neutral-200);border-radius:6px;" title="200"></div>
    <div style="width:50px;height:50px;background:var(--ct-neutral-300);border-radius:6px;" title="300"></div>
    <div style="width:50px;height:50px;background:var(--ct-neutral-400);border-radius:6px;" title="400"></div>
    <div style="width:50px;height:50px;background:var(--ct-neutral-500);border-radius:6px;" title="500"></div>
    <div style="width:50px;height:50px;background:var(--ct-neutral-600);border-radius:6px;" title="600"></div>
    <div style="width:50px;height:50px;background:var(--ct-neutral-700);border-radius:6px;" title="700"></div>
    <div style="width:50px;height:50px;background:var(--ct-neutral-800);border-radius:6px;" title="800"></div>
    <div style="width:50px;height:50px;background:var(--ct-neutral-900);border-radius:6px;" title="900"></div>
  </div>

  <h3>Semánticos</h3>
  <div style="display:flex;gap:4px;flex-wrap:wrap;">
    <div style="width:80px;height:50px;background:var(--ct-bg);border-radius:6px;border:1px solid #ddd;" title="bg"></div>
    <div style="width:80px;height:50px;background:var(--ct-bg-subtle);border-radius:6px;" title="bg-subtle"></div>
    <div style="width:80px;height:50px;background:var(--ct-bg-muted);border-radius:6px;" title="bg-muted"></div>
    <div style="width:80px;height:50px;background:var(--ct-text);border-radius:6px;" title="text"></div>
    <div style="width:80px;height:50px;background:var(--ct-link);border-radius:6px;" title="link"></div>
  </div>
</div>
